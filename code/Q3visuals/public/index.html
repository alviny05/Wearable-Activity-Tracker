<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Prediction Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #00d2ff;
            --success: #00ff88;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 0;
            color: var(--text-muted);
            font-size: 1.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Side-by-Side Dashboard Layout */
        .dashboard-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            align-items: stretch;
        }

        .panel {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Left Side: Chart occupies 65% of the space */
        .chart-panel {
            flex: 0 0 65%;
            display: flex;
            flex-direction: column;
        }

        /* Canvas needs relative positioning wrapper to resize correctly */
        .canvas-container {
            position: relative;
            flex-grow: 1;
            min-height: 400px;
        }

        /* Right Side: Prediction occupies 35% of the space */
        .prediction-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        .info-box {
            background-color: #2a2a2a;
            padding: 30px 20px;
            border-radius: 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-box h3 {
            margin: 0 0 15px 0;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prediction-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
        }

        .confidence-percent {
            font-size: 48px;
            font-weight: bold;
            color: var(--success);
        }

        /* Responsive stack for smaller screens */
        @media (max-width: 900px) {
            .dashboard-wrapper { flex-direction: column; }
            .chart-panel { flex: none; }
        }
    </style>
</head>
<body>

    <h1>Live Activity Recognition Dashboard</h1>


    <div class="dashboard-wrapper">
        <h2>USER 1</h2>
        <div class="panel chart-panel">
            <h2>Live Accelerometer Data</h2>
            <div class="canvas-container">
                <canvas id="accelChart1"></canvas>
            </div>
        </div>

        <div class="panel prediction-panel">
            <h2>Current State</h2>

            <div class="info-box">
                <h3>Detected Activity</h3>
                <div id="predictionState1" class="prediction-value">Awaiting Data</div>
            </div>

            <div class="info-box">
                <h3>ML Confidence</h3>
                <div id="confidenceValue1" class="confidence-percent">--%</div>
            </div>
        </div>

    </div>

    <hr>

    <div class="dashboard-wrapper">
        <h2>USER 2</h2>
        <div class="panel chart-panel">
            <h2>Live Accelerometer Data</h2>
            <div class="canvas-container">
                <canvas id="accelChart2"></canvas>
            </div>
        </div>

        <div class="panel prediction-panel">
            <h2>Current State</h2>

            <div class="info-box">
                <h3>Detected Activity</h3>
                <div id="predictionState2" class="prediction-value">Awaiting Data</div>
            </div>

            <div class="info-box">
                <h3>ML Confidence</h3>
                <div id="confidenceValue2" class="confidence-percent">--%</div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
